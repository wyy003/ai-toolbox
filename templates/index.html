<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Toolbox - Professional AI Tools</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-animation">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="theme-toggle" id="themeToggle">
        <span class="theme-icon">🌙</span>
    </div>

    <div class="cat-decoration cat-1">🐱</div>
    <div class="cat-decoration cat-2">😺</div>
    <div class="cat-decoration cat-3">😸</div>

    <nav class="nav-menu">
        <a href="/" class="nav-link active">🐾 AI工具</a>
    </nav>

    <div class="container">
        <header>
            <div class="header-decoration">✨</div>
            <h1 class="fade-in">AI Toolbox</h1>
            <p class="subtitle fade-in">Summarize / Translate / Polish</p>
            <div class="feature-badges">
                <span class="badge">🚀 快速</span>
                <span class="badge">🎯 精准</span>
                <span class="badge">💡 智能</span>
            </div>
        </header>

        <div class="card input-card glass-effect slide-up">
            <div class="card-header">
                <label>📝 输入文本</label>
                <div class="stats">
                    <span id="charCount">0</span> 字符
                </div>
            </div>
            <div class="textarea-wrapper">
                <textarea id="inputText" placeholder="在此输入您的文本内容，或拖拽文件到此处..."></textarea>
                <div class="drag-overlay" id="dragOverlay">
                    <div class="drag-content">
                        <span class="drag-icon">📁</span>
                        <p>释放文件以读取内容</p>
                    </div>
                </div>
            </div>
            <div class="input-actions">
                <button class="action-btn secondary" id="clearBtn">🗑️ 清空</button>
                <button class="action-btn secondary" id="uploadBtn">📂 上传文件</button>
                <input type="file" id="fileInput" accept=".txt,.md" style="display: none;">
            </div>
        </div>

        <div class="button-group slide-up">
            <button class="tool-btn" data-action="summarize" data-shortcut="1">
                <span class="icon">📝</span>
                <span class="btn-text">文本总结</span>
                <span class="shortcut">Ctrl+1</span>
                <div class="tool-description">提取核心要点</div>
            </button>
            <button class="tool-btn" data-action="translate" data-shortcut="2">
                <span class="icon">🌐</span>
                <span class="btn-text">中英翻译</span>
                <span class="shortcut">Ctrl+2</span>
                <div class="tool-description">智能双向翻译</div>
            </button>
            <button class="tool-btn" data-action="polish" data-shortcut="3">
                <span class="icon">✨</span>
                <span class="btn-text">文案润色</span>
                <span class="shortcut">Ctrl+3</span>
                <div class="tool-description">专业文案优化</div>
            </button>
        </div>

        <div class="card output-card glass-effect slide-up">
            <div class="output-header">
                <label>💎 输出结果</label>
                <div class="output-actions">
                    <button id="cancelBtn" class="action-btn danger" style="display: none;">⏹️ 取消</button>
                    <button id="copyBtn" class="action-btn primary" style="display: none;">📋 复制</button>
                    <button id="downloadBtn" class="action-btn primary" style="display: none;">💾 下载</button>
                </div>
            </div>

            <div id="loadingIndicator" class="loading" style="display: none;">
                <div class="loading-content">
                    <div class="spinner"></div>
                    <span class="loading-text">AI 正在处理中...</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>

            <textarea id="outputText" placeholder="处理结果将显示在这里..." readonly style="display: none;"></textarea>
        </div>

        <div class="card history-card glass-effect slide-up" id="historyCard" style="display: none;">
            <div class="card-header">
                <label>📚 历史记录</label>
                <button class="action-btn secondary small" id="clearHistoryBtn">清空历史</button>
            </div>
            <div id="historyList" class="history-list"></div>
        </div>

        <div class="stats-panel slide-up">
            <div class="stat-item">
                <div class="stat-icon">⚡</div>
                <div class="stat-value" id="totalProcessed">0</div>
                <div class="stat-label">处理次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="totalChars">0</div>
                <div class="stat-label">处理字符</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon">⏱️</div>
                <div class="stat-value" id="avgTime">0s</div>
                <div class="stat-label">平均耗时</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <footer class="footer">
        <p>Made with 💖 by AI Toolbox | Powered by AI 🤖</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
